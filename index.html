<!DOCTYPE html>

<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ram Navami Wishes</title>

  <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Tiro Devanagari Hindi', serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      color: white;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 20px;
      font-size: 6vw; /* Responsive text */
      padding: 0 10px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #fff; }
      to { text-shadow: 0 0 30px yellow; }
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-top: 20px;
      padding: 10px;
    }

    img {
      width: 90%;
      max-width: 300px;
      height: auto;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      transition: transform 0.4s;
    }

    img:hover {
      transform: scale(1.05);
    }

    .footer {
      margin: 20px 10px;
      font-size: 5vw;
      animation: fade 3s infinite;
    }

    @keyframes fade {
      0% {opacity: 0.5;}
      50% {opacity: 1;}
      100% {opacity: 0.5;}
    }

    .heart {
      position: fixed;
      color: red;
      font-size: 18px;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }

    /* Desktop adjustment */
    @media (min-width: 768px) {
      h1 {
        font-size: 36px;
      }

      .footer {
        font-size: 22px;
      }

      .container {
        flex-direction: row;
        justify-content: center;
      }

      img {
        width: 260px;
      }
    }
  </style>

</head>

<body>

  <h1>🌸 आपको राम नवमी की हार्दिक शुभकामनाएं देवी जी 🌸</h1>

  <div class="container">
    <img src="ram.jpg" alt="Shri Ram">
    <img src="girl.jpg" alt="My Girl">
  </div>

  <div class="footer">
    🙏 जय श्री राम 🙏
  </div>

  <script>
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = Math.random() * 10 + 15 + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(createHeart, 400);
  </script>

</body>
</html>
